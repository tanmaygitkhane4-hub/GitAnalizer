version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dev_career_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dev_career
      POSTGRES_USER: devcareer
      POSTGRES_PASSWORD: devcareer_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devcareer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dev_career_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev_career_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://devcareer:devcareer_secret@postgres:5432/dev_career
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-production-super-secret
      JWT_REFRESH_SECRET: change-refresh-secret-in-production
      FRONTEND_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: http://localhost:4000/api/auth/github/callback

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev_career_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000

volumes:
  postgres_data:
  redis_data:
